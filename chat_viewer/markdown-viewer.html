<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="markdown-page">
  <main class="markdown-shell">
    <header class="markdown-topbar">
      <a id="back-link" class="doc-link" href="../">Back to transcripts</a>
      <div>
        <p class="eyebrow">Current Markdown Files</p>
        <h1 id="doc-title">Loading…</h1>
        <p id="doc-meta" class="subtle">Preparing document view.</p>
      </div>
    </header>

    <section class="markdown-card">
      <article id="markdown-content" class="markdown-content"></article>
    </section>
  </main>

  <script src="markdown-viewer.js" defer></script>
</body>
</html>
